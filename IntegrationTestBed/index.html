<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Funnel Gateway 통합 모션 에셋 시뮬레이터 (MVP)</title>
    <style>
        body { background: #0a0a1a; color: white; font-family: 'Consolas', monospace; padding: 20px; }
        .container { max-width: 1000px; margin: auto; padding: 30px; border: 1px solid #333; background: #1a1a2e; box-shadow: 0 0 15px rgba(79, 168, 255, 0.2); }
        h1 { color: #9c27b0; border-bottom: 2px solid #3f51b5; padding-bottom: 10px; }
        #timeline-display { margin: 20px 0; text-align: center; font-size: 1.2em; color: #ffeb3b; }
        #simulation-viewport { width: 100%; height: 450px; background: black; position: relative; overflow: hidden; border: 2px dashed #3f51b5; margin-top: 20px; }
        .state-indicator { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transition: opacity 0.3s ease-out; opacity: 0; pointer-events: none; }
        /* Keyframe Glitch Effect Placeholder */
        #glitch-asset { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(90deg, transparent 50%, rgba(255, 0, 0, 0.3) 50%); opacity: 0; transition: all 0.05s linear; }
        /* CTA Gateway Placeholder */
        #cta-gateway { position: absolute; top: 150px; left: 40%; width: 20%; height: 200px; background-color: rgba(79, 168, 255, 0.3); border: 2px dashed #2196f3; display: none; align-items: center; justify-content: center; color: white; font-size: 1.5em; cursor: pointer; transition: all 0.5s ease; transform: scale(0.8); }
        #cta-gateway.active { display: flex; transform: scale(1); box-shadow: 0 0 20px #2196f3; }
        .log-output { margin-top: 30px; padding: 15px; background: #101020; border: 1px solid #4a4a80; height: 150px; overflow-y: scroll; font-size: 0.9em;}
        .log-output p { margin: 5px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 통합 모션 에셋 시뮬레이터 (MVP)</h1>
    <p><strong>목표:</strong> Funnel Gateway 핵심 결함 구간(T+320ms ~ T+510ms)의 State Machine 무결성 검증 및 오류 예측.</p>

    <!-- 뷰포트: 실제 영상 프레임을 시뮬레이션하는 영역 -->
    <div id="simulation-viewport">
        <!-- 상태 변화에 따라 이 요소들이 활성화/비활성화됩니다. -->
        <div class="state-indicator" id="normal-state"></div>
        <div class="state-indicator" id="glitch-state"></div>
        <div id="glitch-asset"></div>
        <!-- CTA 게이트웨이 (사용자 상호작용 지점) -->
        <div id="cta-gateway">❓ 다음 단계로 넘어가시겠습니까? [CTA]</div>
    </div>

    <div id="timeline-display">현재 시간: 0ms | 상태: 초기화</div>

    <h2>[시스템 로그 및 검증 리포트]</h2>
    <div class="log-output" id="log-output">
        <!-- 여기에 시스템 이벤트와 오류 예측 결과가 출력됩니다. -->
        <p style="color: #4caf50;">✅ 시뮬레이터 준비 완료. '시작' 버튼을 누르면 시간 축이 흐르기 시작합니다.</p>
    </div>

    <button id="start-simulation" style="padding: 10px 20px; background-color: #ff9800; color: white; border: none; cursor: pointer;">▶️ 시뮬레이션 시작</button>
</div>

<script src="./SimulatorEngine.js"></script>
</body>
</html>
